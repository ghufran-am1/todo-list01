<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Todo List · Nested Tasks</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: system-ui, 'Segoe UI', 'Arial', sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(145deg, #1e2b6e, #2a1e5c);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    /* Main app card */
    .app-card {
      max-width: 700px;
      width: 100%;
      background: #ffffff;
      border-radius: 32px;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.25), 0 8px 18px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      transition: all 0.2s ease;
    }

    /* Header */
    .header {
      background: linear-gradient(120deg, #4c3b9b, #2b2d6e);
      padding: 24px 28px;
      color: white;
    }

    .header h1 {
      margin: 0;
      font-size: 1.8rem;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    /* Content */
    .content {
      padding: 24px 28px 32px;
    }

    /* Add main task area */
    .add-task-area {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .add-task-area input {
      flex: 1;
      padding: 14px 16px;
      border: 1.5px solid #e2e8f0;
      border-radius: 28px;
      font-size: 1rem;
      outline: none;
      transition: all 0.2s;
      background-color: #fefefe;
    }

    .add-task-area input:focus {
      border-color: #4c3b9b;
      box-shadow: 0 0 0 3px rgba(76, 59, 155, 0.2);
    }

    .btn-primary {
      background: #4c3b9b;
      color: white;
      border: none;
      padding: 0 28px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .btn-primary:hover {
      background: #362a7a;
      transform: scale(0.97);
    }

    /* Tasks list container */
    .tasks-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Each main task card */
    .task-card {
      background: #f9fafc;
      border-radius: 24px;
      border: 1px solid #eef2f8;
      overflow: hidden;
      transition: all 0.2s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.03);
    }

    .task-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px;
      background: white;
      border-bottom: 1px solid #edf2f7;
      cursor: pointer;
      transition: background 0.1s;
    }

    .task-header:hover {
      background: #fefefe;
    }

    .task-title-area {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .main-check {
      width: 22px;
      height: 22px;
      accent-color: #4c3b9b;
      cursor: default;
      transform: scale(1.05);
      pointer-events: none;
    }

    .task-title {
      font-size: 1.2rem;
      font-weight: 600;
      color: #1e293b;
      word-break: break-word;
    }

    .task-title.done-main {
      text-decoration: line-through;
      color: #8b9eb0;
    }

    .subtask-stats {
      font-size: 0.7rem;
      background: #eef2ff;
      padding: 4px 10px;
      border-radius: 30px;
      color: #2c3e66;
      font-weight: 500;
    }

    .task-actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      background: transparent;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      width: 32px;
      height: 32px;
      border-radius: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: 0.1s;
      color: #5b6e8c;
    }

    .icon-btn:hover {
      background: #eef2ff;
      color: #2d2f5e;
    }

    .delete-main {
      color: #b91c1c;
    }

    .delete-main:hover {
      background: #fee2e2;
      color: #a11313;
    }

    /* Subtasks area */
    .subtasks-area {
      padding: 8px 18px 20px 48px;
      background: #ffffff;
      border-top: 1px solid #f0f4f9;
    }

    .add-subtask {
      display: flex;
      gap: 8px;
      margin: 12px 0 18px;
      align-items: center;
    }

    .add-subtask input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #e2e8f0;
      border-radius: 40px;
      font-size: 0.85rem;
      background: #fefefe;
      outline: none;
    }

    .add-subtask input:focus {
      border-color: #6c5ecf;
    }

    .btn-sub {
      background: #e0e7ff;
      border: none;
      padding: 8px 18px;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.75rem;
      cursor: pointer;
      color: #2d3a6e;
      transition: 0.1s;
    }

    .btn-sub:hover {
      background: #cbd9ff;
    }

    .subtask-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: #fafcff;
      border-radius: 18px;
      margin-bottom: 8px;
      transition: 0.05s linear;
    }

    .subtask-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
    }

    .subtask-check {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #4c3b9b;
    }

    .subtask-text {
      font-size: 0.9rem;
      color: #1f2a44;
      word-break: break-word;
    }

    .subtask-text.done-sub {
      text-decoration: line-through;
      color: #8e9db3;
    }

    .delete-sub {
      background: transparent;
      border: none;
      font-size: 1.1rem;
      cursor: pointer;
      color: #a0abc0;
      padding: 4px 8px;
      border-radius: 30px;
    }

    .delete-sub:hover {
      color: #e53e3e;
      background: #fff0f0;
    }

    .empty-sub-msg {
      font-size: 0.75rem;
      color: #a3b3ce;
      text-align: center;
      padding: 12px 0;
      font-style: italic;
    }

    hr {
      margin: 5px 0;
      border-color: #edf2f7;
    }

    @media (max-width: 550px) {
      .content {
        padding: 18px;
      }
      .subtasks-area {
        padding-left: 16px;
        padding-right: 12px;
      }
      .task-header {
        flex-wrap: wrap;
        gap: 10px;
      }
    }
  </style>
</head>
<body>
<div class="app-card">
  <div class="header">
    <h1>✓ Todo List</h1>
  </div>
  <div class="content">
    <!-- Add main task -->
    <div class="add-task-area">
      <input type="text" id="mainTaskInput" placeholder="Add a main task ..." autocomplete="off">
      <button class="btn-primary" id="addMainBtn">+ Add</button>
    </div>

    <!-- Tasks container -->
    <div id="tasksContainer" class="tasks-list"></div>
  </div>
</div>

<script>
  // ---------- DATA STRUCTURE ----------
  // Each main task: { id, title, subtasks: [{ id, text, done }] }
  let mainTasks = [];

  // Helper: generate unique ID
  function generateId() {
    return Date.now() + '-' + Math.random().toString(36).substr(2, 8);
  }

  // Load data from localStorage
  function loadData() {
    const stored = localStorage.getItem("nested_todo_app");
    if (stored) {
      try {
        mainTasks = JSON.parse(stored);
        // Ensure every subtask has an id (backward compatibility)
        for (let task of mainTasks) {
          if (!task.subtasks) task.subtasks = [];
          for (let sub of task.subtasks) {
            if (!sub.id) sub.id = generateId();
          }
        }
      } catch(e) { mainTasks = []; }
    } else {
      // Demo data to showcase the nested feature
      mainTasks = [
        {
          id: generateId(),
          title: "📚 Read a book",
          subtasks: [
            { id: generateId(), text: "Buy the book", done: true },
            { id: generateId(), text: "Read 20 pages", done: false },
            { id: generateId(), text: "Summarize first chapter", done: false }
          ]
        },
        {
          id: generateId(),
          title: "💻 Web project",
          subtasks: [
            { id: generateId(), text: "Design interface", done: true },
            { id: generateId(), text: "Add subtask feature", done: true },
            { id: generateId(), text: "Test functionality", done: false }
          ]
        },
        {
          id: generateId(),
          title: "🏃 Exercise routine",
          subtasks: []
        }
      ];
    }
  }

  // Save to localStorage
  function saveToLocal() {
    localStorage.setItem("nested_todo_app", JSON.stringify(mainTasks));
  }

  // Determine if a main task is completed based on its subtasks
  // Rule: if there is at least one subtask AND all subtasks are done -> completed = true
  // Otherwise (no subtasks or some incomplete) -> completed = false
  function isMainTaskCompleted(main) {
    if (!main.subtasks || main.subtasks.length === 0) return false;
    return main.subtasks.every(sub => sub.done === true);
  }

  // Create DOM element for a single subtask
  function createSubtaskElement(mainTaskId, subtask) {
    const mainTask = mainTasks.find(t => t.id === mainTaskId);
    if (!mainTask) return document.createElement("div");
    
    const subDiv = document.createElement("div");
    subDiv.className = "subtask-item";
    
    const leftSide = document.createElement("div");
    leftSide.className = "subtask-left";
    
    const chk = document.createElement("input");
    chk.type = "checkbox";
    chk.className = "subtask-check";
    chk.checked = subtask.done;
    
    // When subtask checkbox changes -> update status -> re-render (auto updates main task completion)
    chk.onchange = (e) => {
      e.stopPropagation();
      subtask.done = chk.checked;
      saveToLocal();
      renderApp();  // full re-render to reflect main task auto-completion
    };
    
    const subTextSpan = document.createElement("span");
    subTextSpan.className = "subtask-text";
    if (subtask.done) subTextSpan.classList.add("done-sub");
    subTextSpan.textContent = subtask.text;
    
    leftSide.appendChild(chk);
    leftSide.appendChild(subTextSpan);
    
    const delSubBtn = document.createElement("button");
    delSubBtn.textContent = "✖";
    delSubBtn.className = "delete-sub";
    delSubBtn.title = "Delete subtask";
    delSubBtn.onclick = (e) => {
      e.stopPropagation();
      if (confirm(`Delete subtask: "${subtask.text}" ?`)) {
        const subIndex = mainTask.subtasks.findIndex(s => s.id === subtask.id);
        if (subIndex !== -1) {
          mainTask.subtasks.splice(subIndex, 1);
          saveToLocal();
          renderApp();
        }
      }
    };
    
    subDiv.appendChild(leftSide);
    subDiv.appendChild(delSubBtn);
    return subDiv;
  }

  // Main render function: builds entire UI
  function renderApp() {
    const container = document.getElementById("tasksContainer");
    if (!container) return;
    container.innerHTML = "";

    if (mainTasks.length === 0) {
      container.innerHTML = `<div style="text-align:center; padding:40px 0; color:#96a9c6;">✨ No tasks yet. Add a main task above ✨</div>`;
      return;
    }

    for (let i = 0; i < mainTasks.length; i++) {
      const task = mainTasks[i];
      const isCompleted = isMainTaskCompleted(task);
      const subtaskCount = task.subtasks.length;
      const doneSubtasksCount = task.subtasks.filter(s => s.done).length;
      
      // Main task card
      const taskCard = document.createElement("div");
      taskCard.className = "task-card";
      
      // Header (click to toggle subtasks visibility)
      const headerDiv = document.createElement("div");
      headerDiv.className = "task-header";
      
      const leftArea = document.createElement("div");
      leftArea.className = "task-title-area";
      
      // Main checkbox (read-only, reflects auto-completion status)
      const mainCheck = document.createElement("input");
      mainCheck.type = "checkbox";
      mainCheck.className = "main-check";
      mainCheck.checked = isCompleted;
      mainCheck.disabled = true;
      mainCheck.title = "Auto-completes when all subtasks are done";
      
      const titleSpan = document.createElement("span");
      titleSpan.className = "task-title";
      if (isCompleted) titleSpan.classList.add("done-main");
      titleSpan.textContent = task.title;
      
      const statsSpan = document.createElement("span");
      statsSpan.className = "subtask-stats";
      if (subtaskCount > 0) {
        statsSpan.textContent = `${doneSubtasksCount}/${subtaskCount} subtasks`;
      } else {
        statsSpan.textContent = "📌 No subtasks";
      }
      
      leftArea.appendChild(mainCheck);
      leftArea.appendChild(titleSpan);
      leftArea.appendChild(statsSpan);
      
      const actionsDiv = document.createElement("div");
      actionsDiv.className = "task-actions";
      
      const deleteMainBtn = document.createElement("button");
      deleteMainBtn.innerHTML = "🗑️";
      deleteMainBtn.className = "icon-btn delete-main";
      deleteMainBtn.title = "Delete main task and all subtasks";
      deleteMainBtn.onclick = (e) => {
        e.stopPropagation();
        if (confirm(`Delete "${task.title}" and all its subtasks?`)) {
          mainTasks.splice(i, 1);
          saveToLocal();
          renderApp();
        }
      };
      
      actionsDiv.appendChild(deleteMainBtn);
      
      // Subtoggle visibility state
      let subtasksVisible = true;
      const toggleSubtaskArea = () => {
        const subArea = taskCard.querySelector(".subtasks-area");
        if (subArea) {
          subArea.style.display = subtasksVisible ? "none" : "block";
          subtasksVisible = !subtasksVisible;
        }
      };
      headerDiv.addEventListener("dblclick", toggleSubtaskArea);
      
      headerDiv.appendChild(leftArea);
      headerDiv.appendChild(actionsDiv);
      
      // Subtasks area
      const subtaskArea = document.createElement("div");
      subtaskArea.className = "subtasks-area";
      
      // Add subtask form
      const addSubDiv = document.createElement("div");
      addSubDiv.className = "add-subtask";
      const subInput = document.createElement("input");
      subInput.type = "text";
      subInput.placeholder = "New subtask ...";
      subInput.id = `sub_input_${task.id}`;
      const addSubBtn = document.createElement("button");
      addSubBtn.textContent = "+ Add subtask";
      addSubBtn.className = "btn-sub";
      
      addSubDiv.appendChild(subInput);
      addSubDiv.appendChild(addSubBtn);
      subtaskArea.appendChild(addSubDiv);
      
      // Container for subtasks list
      const subListDiv = document.createElement("div");
      subListDiv.className = "subtasks-list-container";
      
      if (task.subtasks.length === 0) {
        const emptyMsg = document.createElement("div");
        emptyMsg.className = "empty-sub-msg";
        emptyMsg.textContent = "➕ Add subtasks using the field above";
        subListDiv.appendChild(emptyMsg);
      } else {
        task.subtasks.forEach((subtask) => {
          const subItem = createSubtaskElement(task.id, subtask);
          subListDiv.appendChild(subItem);
        });
      }
      
      subtaskArea.appendChild(subListDiv);
      
      // Event: add new subtask
      addSubBtn.onclick = () => {
        const newSubText = subInput.value.trim();
        if (newSubText === "") {
          alert("Please enter a subtask description");
          return;
        }
        const newSub = {
          id: generateId(),
          text: newSubText,
          done: false
        };
        task.subtasks.push(newSub);
        saveToLocal();
        renderApp();
      };
      
      // Allow Enter key to add subtask
      subInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          addSubBtn.click();
        }
      });
      
      taskCard.appendChild(headerDiv);
      taskCard.appendChild(subtaskArea);
      container.appendChild(taskCard);
    }
  }
  
  // Add a new main task
  function addMainTask() {
    const inputField = document.getElementById("mainTaskInput");
    const titleValue = inputField.value.trim();
    if (titleValue === "") {
      alert("Please enter a main task title");
      return;
    }
    const newMain = {
      id: generateId(),
      title: titleValue,
      subtasks: []
    };
    mainTasks.push(newMain);
    saveToLocal();
    renderApp();
    inputField.value = "";
    inputField.focus();
  }
  
  // Initialize event handlers
  function initEventHandlers() {
    const addBtn = document.getElementById("addMainBtn");
    if (addBtn) addBtn.onclick = addMainTask;
    const mainInput = document.getElementById("mainTaskInput");
    if (mainInput) {
      mainInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          addMainTask();
        }
      });
    }
  }
  
  // Start the application
  function init() {
    loadData();
    initEventHandlers();
    renderApp();
  }
  
  init();
</script>
</body>
</html>
